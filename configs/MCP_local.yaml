# Local Spectra 300/digital-twin stack with MCP enabled.
#
# Starts Tango, support devices, Tiled, the selected microscope/digital twin,
# then the FastMCP HTTP server last.
#
#   uv run scripts/run_servers.py --yaml configs/MCP_local.yaml
#   uv run scripts/run_servers.py --yaml configs/MCP_local.yaml --microscope dt

microscope:
  class_name: ThermoMicroscope
  module_name: asyncroscopy.ThermoMicroscope
  description: "Thermo Fisher Spectra 300 TEM"
  host: localhost
  port: 9095

digital_twin:
  class_name: DigitalTwin
  module_name: asyncroscopy.DigitalTwin
  description: "Software digital twin"

devices:
  camera:    { module_name: asyncroscopy.detectors.CAMERA }
  corrector: { module_name: asyncroscopy.hardware.CORRECTOR }
  data:      { module_name: asyncroscopy.software.DATA }
  eds:       { module_name: asyncroscopy.detectors.EDS }
  flucam:    { module_name: asyncroscopy.detectors.FLUCAM }
  scan:      { module_name: asyncroscopy.hardware.SCAN }
  stage:     { module_name: asyncroscopy.hardware.STAGE }

tango:
  host: localhost
  port: 9094

tiled:
  host: localhost
  port: 9091
  acquisition_dir: outputs/tiled_acquisitions
  autostart: true

device_timeout_seconds: 120

mcp:
  autostart: true
  name: Spectra300_MCP
  transport: streamable-http
  http_host: 127.0.0.1
  http_port: 8000
  data_device_address: asyncroscopy/data/default
  search_packages:
    - asyncroscopy
  blocked_classes:
    - DataBase
    - DServer
  blocked_functions:
    "*":
      - Init
      - Kill
      - RestartServer
